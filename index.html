<script>
let messages = [

"Çünkü sen doğdun 🌸",
"Ve biri seni çooook seviyor 👀"

let index = 0;

document.getElementById("cinna").onclick = function() {
  document.getElementById("bubble").innerText = messages[index];
  index++;

};
</script>
